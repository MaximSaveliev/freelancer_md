version: "3.9"

services:
  
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "8088:8088"
    env_file:
      - ./.env
    volumes:
      - ./.env:/app/.env:ro   # optional, if you want the container to see the file
    depends_on:
      - postgres
  
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:



