# freelancermd.com → frontend (port 3000)
server {
    server_name freelancermd.com www.freelancermd.com;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/freelancermd.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/freelancermd.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# api.freelancermd.com → api_gateway (port 8088)
server {
    server_name api.freelancermd.com;

    location / {
        proxy_pass http://localhost:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/freelancermd.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/freelancermd.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.freelancermd.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = freelancermd.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name freelancermd.com www.freelancermd.com;
    return 404; # managed by Certbot
}

server {
    if ($host = api.freelancermd.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name api.freelancermd.com;
    return 404; # managed by Certbot
}
