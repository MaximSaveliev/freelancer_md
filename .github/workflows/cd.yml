name: CD

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/freelancer_md
            git pull origin master
            docker compose up --build -d
            sleep 15
            docker compose ps
            docker compose ps | grep -E "unhealthy|Exit" && echo "ERROR: some containers are unhealthy" && exit 1 || echo "All containers healthy"
            sudo cp ~/freelancer_md/nginx/freelancermd.conf /etc/nginx/sites-available/freelancermd.com
            sudo nginx -t && sudo systemctl reload nginx
