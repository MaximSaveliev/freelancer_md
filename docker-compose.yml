services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: freelancer_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Services ──────────────────────────────────────────────────────────

  api_gateway:
    build: ./services/api_gateway
    container_name: freelancer_api_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./services/api_gateway/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/api_gateway:/app

  auth:
    build: ./services/auth
    container_name: freelancer_auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: ./services/auth/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/auth:/app

  messenger:
    build: ./services/messenger
    container_name: freelancer_messenger
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: ./services/messenger/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/messenger:/app

  notification:
    build: ./services/notification
    container_name: freelancer_notification
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file: ./services/notification/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/notification:/app

  payment:
    build: ./services/payment
    container_name: freelancer_payment
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: ./services/payment/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/payment:/app

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: freelancer_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    depends_on:
      - api_gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  rabbitmq_data:
