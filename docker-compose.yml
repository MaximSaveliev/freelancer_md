services:
  rabbitmq:
    image: rabbitmq:3.12-management  # stable RabbitMQ with management UI
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  # ─── Backend Services ──────────────────────────────────────────────────────
  api_gateway:
    build: ./services/api_gateway
    container_name: api_gateway
    ports:
      - "8088:8088"
    env_file:
      - ./services/api_gateway/.env
    depends_on:
      - postgres
  
  bl:
    build: ./services/bl
    container_name: freelancer_bl
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: ./services/bl/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  messenger:
    build: ./services/messenger
    container_name: messenger
    ports:
      - "8089:8088"
    env_file:
      - ./services/messenger/.env
    depends_on:
      - postgres

  payment:
    build: ./services/payment
    container_name: freelancer_payment
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: ./services/payment/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification:
    build: ./services/notification
    container_name: freelancer_notification
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file: ./services/notification/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: freelancer_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  rabbitmq_data:
  postgres_data: