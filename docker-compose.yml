services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: freelancer_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Services ──────────────────────────────────────────────────────

  bl:
    build: ./services/bl
    container_name: freelancer_bl
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: ./services/bl/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment:
    build: ./services/payment
    container_name: freelancer_payment
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: ./services/payment/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification:
    build: ./services/notification
    container_name: freelancer_notification
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file: ./services/notification/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: freelancer_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  rabbitmq_data:
